name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - 'worca-ui/**'
  pull_request:
    branches: [master]
    paths:
      - 'worca-ui/**'

jobs:
  ui-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: worca-ui/package-lock.json

      # `npm run build` codegens worca-ui/app/utils/status-constants.js
      # from src/worca/state/status.py (see scripts/build-frontend.js), so
      # Python + worca-cc must be importable before the build can succeed.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install worca-cc (for status-constants codegen)
        run: pip install -e .

      - name: Install dependencies
        working-directory: worca-ui
        run: npm ci

      - name: Build frontend bundle
        working-directory: worca-ui
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('worca-ui/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: worca-ui
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: worca-ui
        run: npx playwright install-deps chromium

      # The beads-rendering e2e specs seed a real beads db via the `bd` CLI, and
      # the server reads it back through `bd` too. Pin 0.49.0 (README): later
      # versions require Dolt DB.
      - name: Install bd CLI
        run: npm install -g @beads/bd@0.49.0

      - name: Run Playwright tests
        working-directory: worca-ui
        run: npx playwright test --workers=1
