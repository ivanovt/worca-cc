name: Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache global npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: npm-global-${{ runner.os }}-

      - name: Install claude and bd CLIs
        run: npm install -g @anthropic-ai/claude-code @beads/bd

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest tests/

  ui-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: worca-ui/package-lock.json

      - name: Install dependencies
        working-directory: worca-ui
        run: npm ci

      - name: Lint with biome
        working-directory: worca-ui
        run: npx biome check

      - name: Run vitest
        working-directory: worca-ui
        run: npx vitest run
