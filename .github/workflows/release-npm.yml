name: Release to npm

on:
  push:
    tags:
      - "worca-ui-v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: worca-ui/package-lock.json

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Validate tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#worca-ui-v}"
          PKG_VERSION=$(node -p "require('./worca-ui/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # status-constants.js is codegen'd from src/worca/state/status.py by
      # `npm run build` (see worca-ui/scripts/build-frontend.js), so the
      # build needs Python + worca-cc importable on PATH.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install worca-cc (for status-constants codegen)
        run: pip install -e .

      - name: Install dependencies
        working-directory: worca-ui
        run: npm ci

      - name: Build frontend bundle
        working-directory: worca-ui
        run: npm run build

      - name: Run tests
        working-directory: worca-ui
        run: npx vitest run

      - name: Determine npm dist-tag
        id: dist-tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#worca-ui-v}"
          if echo "$VERSION" | grep -q -- '-rc\.'; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # Auth is via OIDC Trusted Publishing (no NPM_TOKEN). Provenance is
      # generated automatically; --provenance makes the requirement explicit.
      - name: Publish to npm
        working-directory: worca-ui
        run: npm publish --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}

  release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#worca-ui-v}"
          PRERELEASE=""
          if echo "$VERSION" | grep -q -- '-rc\.'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --title "@worca/ui $VERSION" \
            --generate-notes \
            $PRERELEASE
