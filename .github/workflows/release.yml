name: Release

on:
  push:
    tags:
      - "worca-cc-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches pyproject.toml version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#worca-cc-v}"
          PROJECT_VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'^version\s*=\s*\"(.+?)\"', f.read(), re.MULTILINE)
              print(m.group(1))
          ")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: worca-ui/package-lock.json

      - name: Build worca-ui bundle
        working-directory: worca-ui
        run: |
          npm ci
          npm run build

      - name: Create release archive
        run: |
          git archive --format=zip --prefix="worca-cc-${VERSION}/" -o "worca-cc-${VERSION}.zip" HEAD
          git archive --format=tar.gz --prefix="worca-cc-${VERSION}/" -o "worca-cc-${VERSION}.tar.gz" HEAD

      - name: Generate checksums
        run: |
          sha256sum "worca-cc-${VERSION}.zip" "worca-cc-${VERSION}.tar.gz" > "checksums-sha256.txt"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "worca-cc ${TAG_NAME}" \
            --generate-notes \
            "worca-cc-${VERSION}.zip" \
            "worca-cc-${VERSION}.tar.gz" \
            "checksums-sha256.txt"
